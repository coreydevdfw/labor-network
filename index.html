<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Labor Network</title>
  <script src='https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js'></script>
  <link href='https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css' rel='stylesheet' />
  <style>
    body { margin: 0; padding: 0; }
    #map { position: absolute; top: 0; bottom: 0; width: 100%; }
  </style>
</head>
<body>
  <div id="map"></div>
  <script>
    mapboxgl.accessToken = 'pk.eyJ1IjoiY29yZXlkZXZkZnciLCJhIjoiY21xaHVvanM2MDE3bDJ0cHB4NTF4andpdiJ9.7zXPq8gI54J5-OEEh69E5w';

    const map = new mapboxgl.Map({
      container: 'map',
      style: 'mapbox://styles/mapbox/dark-v11',
      center: [-96.7970, 33.0137],
      zoom: 10
    });

    map.on('load', async () => {
      const appId = 'b7919541';
      const appKey = '3f2d6edcdeb9e34e2532ad7e64f6f7b2';

      const response = await fetch(
        `https://api.adzuna.com/v1/api/jobs/us/search/1?app_id=${appId}&app_key=${appKey}&where=Dallas,TX&results_per_page=50&distance=25`
      );

      const data = await response.json();
      const jobs = data.results;

      jobs.forEach(job => {
        const title = job.title;
        const company = job.company.display_name;
        const url = job.redirect_url;
        const lat = job.latitude;
        const lng = job.longitude;

        if (lat && lng) {
          new mapboxgl.Marker({ color: '#00ff88' })
            .setLngLat([lng, lat])
            .setPopup(new mapboxgl.Popup().setHTML(
              `<strong>${title}</strong><br>${company}<br><a href="${url}" target="_blank">Apply</a>`
            ))
            .addTo(map);
        }
      });
    });
  </script>
</body>
</html>
