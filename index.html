<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Labor Network</title>
  <meta name="description" content="Hyperlocal jobs in your DFW neighborhood"/>
  <meta name="theme-color" content="#0a0a0a"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Labor Network"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icon-192.png"/>
  <script src='https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js'></script>
  <link href='https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css' rel='stylesheet' />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0a0a0a; overflow: hidden;
      /* Safe area for notched phones */
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }

    #app { display: flex; height: 100dvh; width: 100vw; }
    #sidebar {
      width: 320px; min-width: 320px; height: 100dvh;
      background: #0f0f0f;
      border-right: 1px solid rgba(255,255,255,0.07);
      display: flex; flex-direction: column; z-index: 10;
    }
    #map-wrap { flex: 1; position: relative; }
    #map { position: absolute; inset: 0; }

    /* ── Vignette — size set dynamically via JS ── */
    #vignette {
      position: absolute; inset: 0; z-index: 2;
      pointer-events: none;
      /* default — overridden by JS once location known */
      background: radial-gradient(
        ellipse 60% 60% at 50% 50%,
        transparent 35%,
        rgba(5,5,5,0.5) 58%,
        rgba(5,5,5,0.88) 78%,
        rgba(5,5,5,0.97) 100%
      );
      transition: background 0.6s ease;
    }

    /* ── Sidebar header ── */
    #sidebar-header {
      padding: 16px 14px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
    }
    .logo { font-size: 15px; font-weight: 800; color: #00ff88; letter-spacing: 0.05em; }
    .tagline { font-size: 10px; color: rgba(255,255,255,0.3); margin-top: 1px; }

    #locate-btn {
      display: flex; align-items: center; gap: 5px;
      font-size: 11px; font-weight: 600; color: #00ff88;
      background: rgba(0,255,136,0.08); border: 1px solid rgba(0,255,136,0.25);
      border-radius: 8px; padding: 6px 10px; cursor: pointer;
      transition: all 0.18s; white-space: nowrap; flex-shrink: 0; font-family: inherit;
    }
    #locate-btn:hover { background: rgba(0,255,136,0.16); }
    #locate-btn.located { color: #fff; border-color: rgba(255,255,255,0.15); background: rgba(255,255,255,0.06); }
    #locate-btn.locating { opacity: 0.5; pointer-events: none; }
    #locate-btn svg { width: 12px; height: 12px; flex-shrink: 0; }

    /* ── Filter ── */
    #filter-wrap {
      padding: 10px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
    }
    #filter-select-wrap { position: relative; display: flex; align-items: center; }
    #cat-dot {
      position: absolute; left: 10px; width: 8px; height: 8px;
      border-radius: 50%; pointer-events: none; transition: background 0.2s; z-index: 1;
    }
    #filter-select-wrap::after {
      content: '▾'; position: absolute; right: 10px; top: 50%;
      transform: translateY(-50%); color: rgba(255,255,255,0.3); font-size: 11px; pointer-events: none;
    }
    #category-select {
      width: 100%; appearance: none; -webkit-appearance: none;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px; padding: 9px 28px 9px 26px;
      color: #fff; font-size: 12px; font-weight: 600;
      cursor: pointer; outline: none; font-family: inherit;
    }
    #category-select:focus { border-color: rgba(0,255,136,0.4); }
    #category-select option { background: #1a1a1a; color: #fff; }

    /* ── Job list section ── */
    #list-section { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    #count-bar {
      padding: 8px 14px 6px; font-size: 11px;
      color: rgba(255,255,255,0.35); flex-shrink: 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    #count-bar strong { color: #fff; font-weight: 700; }

    #job-list { flex: 1; overflow-y: auto; padding: 8px; }
    #job-list::-webkit-scrollbar { width: 3px; }
    #job-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

    /* ── Pre-select prompt ── */
    #pre-select {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 32px 24px; text-align: center; gap: 12px;
    }
    #pre-select .ps-icon {
      font-size: 28px; opacity: 0.4;
    }
    #pre-select .ps-title {
      font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.6);
    }
    #pre-select .ps-sub {
      font-size: 11px; color: rgba(255,255,255,0.25); line-height: 1.6;
    }

    .job-card {
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px; padding: 11px 13px; margin-bottom: 6px;
      cursor: pointer; transition: all 0.15s; border-left: 3px solid;
    }
    .job-card:hover { background: rgba(255,255,255,0.06); transform: translateX(2px); }
    .job-card.active { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.14); }
    .card-title { font-size: 12px; font-weight: 700; color: #fff; margin-bottom: 3px; line-height: 1.35; }
    .card-company { font-size: 11px; color: rgba(255,255,255,0.4); margin-bottom: 6px; }
    .card-footer { display: flex; align-items: center; justify-content: space-between; }
    .card-cat { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 10px; background: rgba(255,255,255,0.06); letter-spacing: 0.02em; }
    .card-apply { font-size: 10px; font-weight: 700; color: #00ff88; text-decoration: none; }
    .card-apply:hover { text-decoration: underline; }

    #empty-state { text-align:center; padding:32px 20px; color:rgba(255,255,255,0.25); font-size:12px; line-height:1.6; display:none; }
    #loading-state { text-align:center; padding:32px 20px; color:rgba(255,255,255,0.3); font-size:12px; display:none; }
    .pulse { animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:0.8} }

    /* ── Zoom hint ── */
    #zoom-hint {
      position: absolute; bottom: 28px; right: 12px; z-index: 6;
      background: rgba(10,10,10,0.7); border: 1px solid rgba(255,255,255,0.07);
      border-radius: 8px; padding: 5px 10px;
      color: rgba(255,255,255,0.3); font-size: 11px;
      transition: opacity 0.4s; pointer-events: none;
    }

    /* ── Location permission banner ── */
    #location-banner {
      position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%);
      z-index: 8; background: rgba(15,15,15,0.92);
      border: 1px solid rgba(0,255,136,0.3); border-radius: 10px;
      padding: 10px 16px; display: flex; align-items: center; gap: 10px;
      font-size: 12px; color: rgba(255,255,255,0.7); white-space: nowrap;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      opacity: 0; pointer-events: none; transition: opacity 0.4s;
    }
    #location-banner.show { opacity: 1; pointer-events: auto; }
    #location-banner button {
      font-size: 11px; font-weight: 700; color: #0a0a0a;
      background: #00ff88; border: none; border-radius: 6px;
      padding: 4px 10px; cursor: pointer; font-family: inherit;
    }

    /* ── Popup ── */
    .mapboxgl-popup-content {
      background: #111 !important; border: 1px solid rgba(0,255,136,0.25) !important;
      border-radius: 10px !important; padding: 14px 16px !important;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6) !important; min-width: 200px;
    }
    .mapboxgl-popup-tip { display:none !important; }
    .mapboxgl-popup-close-button { color:rgba(255,255,255,0.4)!important; font-size:16px!important; top:6px!important; right:8px!important; }
    .popup-title { font-size:13px; font-weight:700; color:#fff; margin-bottom:4px; line-height:1.3; padding-right:16px; }
    .popup-company { font-size:12px; color:rgba(255,255,255,0.5); margin-bottom:10px; }
    .popup-apply { display:inline-block; font-size:12px; font-weight:600; color:#0a0a0a; background:#00ff88; border-radius:6px; padding:5px 12px; text-decoration:none; }
    .popup-apply:hover { opacity:0.85; }

    /* ── Mobile ── */
    @media (max-width: 640px) {
      #app { flex-direction: column; }
      #sidebar { width:100%; min-width:unset; height:auto; max-height:48dvh; border-right:none; border-bottom:1px solid rgba(255,255,255,0.07); }
      #map-wrap { flex:1; min-height: 0; }
    }
  </style>
</head>
<body>
<div id="app">

  <div id="sidebar">
    <div id="sidebar-header">
      <div>
        <div class="logo">Labor Network</div>
        <div class="tagline">Hyperlocal jobs · DFW</div>
      </div>
      <button id="locate-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
          <circle cx="12" cy="12" r="8" stroke-opacity="0.35"/>
        </svg>
        Share location
      </button>
    </div>

    <div id="filter-wrap">
      <div id="filter-select-wrap">
        <span id="cat-dot"></span>
        <select id="category-select"></select>
      </div>
    </div>

    <!-- shown only after a category is chosen -->
    <div id="list-section" style="display:none">
      <div id="count-bar"><strong id="job-count">—</strong> jobs found</div>
      <div id="job-list">
        <div id="loading-state" class="pulse">Loading…</div>
        <div id="empty-state">No jobs in this category nearby.<br>Try another filter.</div>
      </div>
    </div>

    <!-- default state before filter chosen -->
    <div id="pre-select">
      <div class="ps-icon">📍</div>
      <div class="ps-title">Choose a job category</div>
      <div class="ps-sub">Select an industry above to see<br>openings on the map near you.</div>
    </div>
  </div>

  <div id="map-wrap">
    <div id="map"></div>
    <div id="vignette"></div>
    <div id="zoom-hint">Zoom in to explore your neighborhood →</div>
    <div id="location-banner">
      📍 Share your location for a tighter radius
      <button onclick="requestLocation()">Allow</button>
    </div>
  </div>

</div>
<script>
  mapboxgl.accessToken = 'pk.eyJ1IjoiY29yZXlkZXZkZnciLCJhIjoiY21xaHVvanM2MDE3bDJ0cHB4NTF4andpdiJ9.7zXPq8gI54J5-OEEh69E5w';
  const APP_ID  = 'b7919541';
  const APP_KEY = '3f2d6edcdeb9e34e2532ad7e64f6f7b2';
  let CENTER    = [-96.7970, 33.0137];
  let userLocated = false;
  const RADIUS  = 25;

  const CATEGORIES = [
    { tag:'placeholder',               label:'Select a category…', color:'#555' },
    { tag:'all',                       label:'All Categories',      color:'#00ff88' },
    { tag:'logistics-warehouse-jobs',  label:'Warehouse & Logistics', color:'#ff9f43' },
    { tag:'manufacturing-jobs',        label:'Manufacturing',       color:'#54a0ff' },
    { tag:'trade-construction-jobs',   label:'Trades & Construction', color:'#ffd32a' },
    { tag:'retail-jobs',               label:'Retail',              color:'#c56cf0' },
    { tag:'customer-services-jobs',    label:'Customer Service',    color:'#ff6b81' },
    { tag:'engineering-jobs',          label:'Engineering',         color:'#0be881' },
    { tag:'admin-jobs',                label:'Admin & Office',      color:'#67e8f9' },
  ];
  const colorMap = {};
  CATEGORIES.forEach(c => { colorMap[c.tag] = c.color; });

  let allJobs = [], activeFilter = 'placeholder', activePopup = null, activeCard = null;

  // ── Map ───────────────────────────────────────────────────────────────────
  const map = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/mapbox/dark-v11',
    center: CENTER, zoom: 10, minZoom: 8, maxZoom: 19,
    pitch: 0
  });
  map.addControl(new mapboxgl.NavigationControl({ showCompass: true }), 'top-right');

  // ── Vignette tied to radius ───────────────────────────────────────────────
  function updateVignette() {
    const mapEl = document.getElementById('map-wrap');
    const W = mapEl.offsetWidth, H = mapEl.offsetHeight;

    // Project center + one radius-edge point to screen
    const centerPx = map.project(CENTER);
    // point due north by RADIUS miles
    const R = 3958.8;
    const edgeLat = CENTER[1] + (RADIUS / R) * (180 / Math.PI);
    const edgePx  = map.project([CENTER[0], edgeLat]);

    // Radius in pixels
    const radiusPx = Math.abs(centerPx.y - edgePx.y);

    // Center offset as % of map container
    const cx = ((centerPx.x / W) * 100).toFixed(1);
    const cy = ((centerPx.y / H) * 100).toFixed(1);

    // Radius as % of container (use smallest dimension for ellipse uniformity)
    const rx = ((radiusPx / W) * 100).toFixed(1);
    const ry = ((radiusPx / H) * 100).toFixed(1);

    const inner  = Math.min(parseFloat(rx), parseFloat(ry));
    const mid    = inner * 1.35;
    const outer1 = inner * 1.65;

    document.getElementById('vignette').style.background = `
      radial-gradient(
        ellipse ${rx}% ${ry}% at ${cx}% ${cy}%,
        transparent ${inner.toFixed(1)}%,
        rgba(5,5,5,0.45) ${mid.toFixed(1)}%,
        rgba(5,5,5,0.88) ${outer1.toFixed(1)}%,
        rgba(5,5,5,0.97) 100%
      )
    `;
  }
  map.on('move', updateVignette);
  map.on('zoom', updateVignette);
  map.on('resize', updateVignette);

  // ── Circle ────────────────────────────────────────────────────────────────
  function makeCircle(center, radiusMiles, steps=64) {
    const coords=[], R=3958.8, lat=center[1]*Math.PI/180;
    for(let i=0;i<=steps;i++){
      const a=(i/steps)*2*Math.PI;
      coords.push([center[0]+(radiusMiles/R)*Math.sin(a)/Math.cos(lat)*180/Math.PI, center[1]+(radiusMiles/R)*Math.cos(a)*180/Math.PI]);
    }
    return {type:'FeatureCollection',features:[{type:'Feature',geometry:{type:'Polygon',coordinates:[coords]}}]};
  }
  function updateCircle() {
    if(map.getSource('radius-circle')) map.getSource('radius-circle').setData(makeCircle(CENTER,RADIUS));
    updateVignette();
  }

  // ── Location ──────────────────────────────────────────────────────────────
  function requestLocation() {
    const btn = document.getElementById('locate-btn');
    const banner = document.getElementById('location-banner');
    banner.classList.remove('show');
    btn.classList.add('locating');
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/><circle cx="12" cy="12" r="8" stroke-opacity="0.35"/></svg> Locating…`;

    navigator.geolocation.getCurrentPosition(pos => {
      CENTER = [pos.coords.longitude, pos.coords.latitude];
      userLocated = true;
      map.flyTo({ center: CENTER, zoom: 12, pitch: 45, duration: 1400 });
      updateCircle();
      btn.classList.remove('locating');
      btn.classList.add('located');
      btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3" fill="currentColor"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg> Located`;
    }, () => {
      btn.classList.remove('locating');
      btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/><circle cx="12" cy="12" r="8" stroke-opacity="0.35"/></svg> Share location`;
    });
  }

  document.getElementById('locate-btn').addEventListener('click', requestLocation);

  // Show banner after 3s if not yet located
  setTimeout(() => {
    if (!userLocated) document.getElementById('location-banner').classList.add('show');
  }, 3000);
  // Auto-hide banner after 8s
  setTimeout(() => document.getElementById('location-banner').classList.remove('show'), 8000);

  // ── Dropdown ──────────────────────────────────────────────────────────────
  const sel = document.getElementById('category-select');
  const dot = document.getElementById('cat-dot');
  CATEGORIES.forEach(cat => {
    const opt = document.createElement('option');
    opt.value = cat.tag; opt.textContent = cat.label;
    if(cat.tag==='placeholder') opt.disabled = true;
    sel.appendChild(opt);
  });
  sel.value = 'placeholder';

  function syncDot() {
    const cat = CATEGORIES.find(c=>c.tag===sel.value)||CATEGORIES[0];
    dot.style.background = cat.color;
  }
  syncDot();

  sel.addEventListener('change', () => {
    activeFilter = sel.value;
    syncDot();

    // Show list section, hide pre-select
    document.getElementById('pre-select').style.display = 'none';
    document.getElementById('list-section').style.display = 'flex';
    document.getElementById('list-section').style.flexDirection = 'column';
    document.getElementById('list-section').style.overflow = 'hidden';
    document.getElementById('list-section').style.flex = '1';

    renderSidebar();
    updateMapLayer();
  });

  // ── Jobs ──────────────────────────────────────────────────────────────────
  function filteredJobs() {
    return activeFilter==='all'||activeFilter==='placeholder' ? allJobs : allJobs.filter(j=>j.category===activeFilter);
  }

  function renderSidebar() {
    const jobs = filteredJobs();
    const list = document.getElementById('job-list');
    const loading = document.getElementById('loading-state');
    const empty = document.getElementById('empty-state');

    loading.style.display = allJobs.length===0 ? 'block' : 'none';
    empty.style.display = allJobs.length>0 && jobs.length===0 ? 'block' : 'none';
    document.getElementById('job-count').textContent = jobs.length;

    list.querySelectorAll('.job-card').forEach(el=>el.remove());
    const catInfo = tag => CATEGORIES.find(c=>c.tag===tag)||CATEGORIES[1];

    jobs.forEach((job,i) => {
      const cat = catInfo(job.category);
      const card = document.createElement('div');
      card.className='job-card'; card.dataset.index=i; card.style.borderLeftColor=cat.color;
      card.innerHTML=`<div class="card-title">${job.title}</div><div class="card-company">${job.company}</div><div class="card-footer"><span class="card-cat" style="color:${cat.color}">${cat.label}</span><a class="card-apply" href="${job.url}" target="_blank" rel="noopener" onclick="event.stopPropagation()">Apply →</a></div>`;
      card.addEventListener('click',()=>focusJob(job,card));
      list.appendChild(card);
    });
  }

  function focusJob(job, card) {
    if(activeCard) activeCard.classList.remove('active');
    card.classList.add('active'); activeCard=card;
    if(activePopup) activePopup.remove();
    map.flyTo({ center:[job.lng,job.lat], zoom:Math.max(map.getZoom(),15), pitch:50, duration:800 });
    activePopup = new mapboxgl.Popup({closeButton:true,maxWidth:'260px'})
      .setLngLat([job.lng,job.lat])
      .setHTML(`<div class="popup-title">${job.title}</div><div class="popup-company">${job.company}</div><a class="popup-apply" href="${job.url}" target="_blank" rel="noopener">View & Apply →</a>`)
      .addTo(map);
  }

  function updateMapLayer() {
    const jobs = activeFilter==='placeholder' ? [] : filteredJobs();
    const geojson={type:'FeatureCollection',features:jobs.map(job=>({type:'Feature',geometry:{type:'Point',coordinates:[job.lng,job.lat]},properties:{title:job.title,company:job.company,url:job.url,category:job.category,color:colorMap[job.category]||'#00ff88'}}))};
    if(map.getSource('jobs')) map.getSource('jobs').setData(geojson);
  }

  async function fetchCategory(tag) {
    const catParam=(tag==='all')?'':`&category=${tag}`;
    try {
      const res=await fetch(`https://api.adzuna.com/v1/api/jobs/us/search/1?app_id=${APP_ID}&app_key=${APP_KEY}&where=Dallas,TX&results_per_page=50&distance=${RADIUS}${catParam}`);
      const data=await res.json();
      return (data.results||[]).filter(j=>j.latitude&&j.longitude).map(j=>({id:j.id,title:j.title,company:j.company?.display_name||'Unknown',url:j.redirect_url,lat:j.latitude,lng:j.longitude,category:tag==='all'?(j.category?.tag||'all'):tag}));
    } catch(e){ return []; }
  }

  // ── Map load ──────────────────────────────────────────────────────────────
  map.on('load', async () => {

    // 3D buildings
    map.addLayer({
      id:'3d-buildings', source:'composite', 'source-layer':'building',
      filter:['==','extrude','true'], type:'fill-extrusion', minzoom:14,
      paint:{
        'fill-extrusion-color':'#1a1a2e',
        'fill-extrusion-height':['interpolate',['linear'],['zoom'],14,0,14.5,['get','height']],
        'fill-extrusion-base':['interpolate',['linear'],['zoom'],14,0,14.5,['get','min_height']],
        'fill-extrusion-opacity':0.75
      }
    });

    // Radius circle
    map.addSource('radius-circle',{type:'geojson',data:makeCircle(CENTER,RADIUS)});
    map.addLayer({id:'radius-fill',type:'fill',source:'radius-circle',paint:{'fill-color':'#00ff88','fill-opacity':0.03}});
    map.addLayer({id:'radius-outline',type:'line',source:'radius-circle',paint:{'line-color':'#00ff88','line-width':1.5,'line-opacity':0.3,'line-dasharray':[4,3]}});

    // Jobs source
    map.addSource('jobs',{type:'geojson',data:{type:'FeatureCollection',features:[]},cluster:true,clusterMaxZoom:13,clusterRadius:48});
    map.addLayer({id:'clusters',type:'circle',source:'jobs',filter:['has','point_count'],paint:{'circle-color':['step',['get','point_count'],'#00cc6e',5,'#00ff88',15,'#66ffbb'],'circle-radius':['step',['get','point_count'],18,5,24,15,30],'circle-opacity':0.9,'circle-stroke-width':1.5,'circle-stroke-color':'rgba(0,255,136,0.3)'}});
    map.addLayer({id:'cluster-count',type:'symbol',source:'jobs',filter:['has','point_count'],layout:{'text-field':'{point_count_abbreviated}','text-font':['DIN Pro Bold','Arial Unicode MS Bold'],'text-size':12},paint:{'text-color':'#0a0a0a'}});
    map.addLayer({id:'unclustered-point',type:'circle',source:'jobs',filter:['!',['has','point_count']],paint:{'circle-color':['coalesce',['get','color'],'#00ff88'],'circle-radius':['interpolate',['linear'],['zoom'],13,6,16,10],'circle-stroke-width':1.5,'circle-stroke-color':'rgba(255,255,255,0.2)','circle-opacity':0.95}});

    map.on('click','clusters',e=>{
      const f=map.queryRenderedFeatures(e.point,{layers:['clusters']});
      map.getSource('jobs').getClusterExpansionZoom(f[0].properties.cluster_id,(err,zoom)=>{
        if(!err) map.easeTo({center:f[0].geometry.coordinates,zoom,duration:500});
      });
    });

    map.on('click','unclustered-point',e=>{
      const{title,company,url}=e.features[0].properties;
      const coords=e.features[0].geometry.coordinates.slice();
      if(activePopup) activePopup.remove();
      activePopup=new mapboxgl.Popup({closeButton:true,maxWidth:'260px'}).setLngLat(coords).setHTML(`<div class="popup-title">${title}</div><div class="popup-company">${company}</div><a class="popup-apply" href="${url}" target="_blank" rel="noopener">View & Apply →</a>`).addTo(map);
      map.flyTo({center:coords,zoom:Math.max(map.getZoom(),15),pitch:50,duration:700});
      const jobs=filteredJobs();
      const idx=jobs.findIndex(j=>j.title===title&&j.company===company);
      if(idx>=0){
        const card=document.querySelector(`.job-card[data-index="${idx}"]`);
        if(card){if(activeCard)activeCard.classList.remove('active');card.classList.add('active');activeCard=card;card.scrollIntoView({behavior:'smooth',block:'nearest'});}
      }
    });

    map.on('mouseenter','clusters',()=>map.getCanvas().style.cursor='pointer');
    map.on('mouseleave','clusters',()=>map.getCanvas().style.cursor='');
    map.on('mouseenter','unclustered-point',()=>map.getCanvas().style.cursor='pointer');
    map.on('mouseleave','unclustered-point',()=>map.getCanvas().style.cursor='');

    map.on('zoom',()=>{
      const z=map.getZoom();
      document.getElementById('zoom-hint').style.opacity=z>12?'0':'1';
      const fade=Math.max(0,Math.min(1,(14-z)/2));
      map.setPaintProperty('radius-fill','fill-opacity',0.03*fade);
      map.setPaintProperty('radius-outline','line-opacity',0.3*fade);
    });

    updateVignette();

    // Prefetch all categories in background
    const tagsToFetch=CATEGORIES.filter(c=>c.tag!=='all'&&c.tag!=='placeholder').map(c=>c.tag);
    const results=await Promise.all(tagsToFetch.map(fetchCategory));
    const seen=new Set();
    results.flat().forEach(job=>{if(!seen.has(job.id)){seen.add(job.id);allJobs.push(job);}});

    // If list is already open (user selected fast), refresh it
    if(activeFilter!=='placeholder') { renderSidebar(); updateMapLayer(); }
  });
</script>
</body>
</html>
